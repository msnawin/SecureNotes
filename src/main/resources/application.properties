spring.application.name=notes

# ===============================
# LOCAL SECURITY
# ===============================
spring.security.user.name=nawin
# Use an environment variable, but provide a default for local development
spring.security.user.password=${SPRING_SECURITY_PASSWORD:password}

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/securenotes
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=DEBUG

# ===============================
# JWT CONFIGURATION
# ===============================
# A highly secure, Base64-encoded secret key (Must be at least 256 bits)
spring.app.jwtSecret=${JWT_SECRET}

# Expiration time in milliseconds (86400000 ms = 24 hours)
spring.app.jwtExpirationMs=172800000

# ===============================
# FRONTEND
# ===============================
frontend.url=http://localhost:3000

# ===============================
# EMAIL CONFIGURATION
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# OAUTH2 CONFIGURATION
# ===============================

# GitHub OAuth2 configuration
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}