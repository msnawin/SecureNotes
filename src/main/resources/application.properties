spring.application.name=notes

# --- Security Credentials (Injected via Environment Variables) ---
spring.security.user.name=${SPRING_SECURITY_USER:admin}
spring.security.user.password=${SPRING_SECURITY_PASSWORD:password}

# --- Database Configuration (Injected via Environment Variables) ---
spring.datasource.url=jdbc:mysql://localhost:3306/securenotes
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

# --- JPA / Hibernate Settings ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Logging ---
logging.level.org.springframework.security=DEBUG
